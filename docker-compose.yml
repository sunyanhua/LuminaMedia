
services:
  db-lumina:
    image: mysql:8.0
    container_name: lumina-media-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lumina_media
      MYSQL_USER: lumina_user
      MYSQL_PASSWORD: lumina_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/02-analytics-migration.sql:/docker-entrypoint-initdb.d/02-analytics-migration.sql
      - ./scripts/03-content-generation-migration.sql:/docker-entrypoint-initdb.d/03-content-generation-migration.sql
      - ./scripts/customer-data-migration.sql:/docker-entrypoint-initdb.d/04-customer-data-migration.sql
      - ./scripts/05-sharding-setup.sql:/docker-entrypoint-initdb.d/05-sharding-setup.sql
      - ./scripts/10-workflow-tables.sql:/docker-entrypoint-initdb.d/06-workflow-tables.sql
      - ./scripts/11-skywalking-init.sql:/docker-entrypoint-initdb.d/07-skywalking-init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      timeout: 10s
      retries: 5
    networks:
      - lumina-media-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lumina-media-app
    restart: always
    environment:
      - NODE_ENV=development
      - DB_HOST=${DB_HOST:-db-lumina}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-lumina_user}
      - DB_PASSWORD=${DB_PASSWORD:-lumina_password}
      - DB_DATABASE=${DB_DATABASE:-lumina_media}
      - APP_PORT=3003
      - PORT=3003
      - APP_ENV=development
      - TYPEORM_SYNCHRONIZE=false
      - TYPEORM_LOGGING=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE:-0.7}
      - GEMINI_MAX_TOKENS=${GEMINI_MAX_TOKENS:-2048}
      - GEMINI_TOP_P=${GEMINI_TOP_P:-0.95}
      - GEMINI_TOP_K=${GEMINI_TOP_K:-40}
      - GEMINI_KEY_ROTATION=${GEMINI_KEY_ROTATION:-sequential}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-your_dashscope_api_key_here}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-max}
      - QWEN_TEMPERATURE=${QWEN_TEMPERATURE:-0.7}
      - QWEN_MAX_TOKENS=${QWEN_MAX_TOKENS:-2048}
      - HTTPS_PROXY=http://host.docker.internal:7897
      - HTTP_PROXY=http://host.docker.internal:7897
      - GOOGLE_CLOUD_HTTP_PROXY=http://host.docker.internal:7897
      - GOOGLE_AUTH_HTTP_PROXY=http://host.docker.internal:7897
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_ENABLE_AUTH=${QDRANT_ENABLE_AUTH:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-lumina_redis_password}
      - REDIS_DB=0
      - APM_ENABLED=${APM_ENABLED:-true}
      - APM_SERVICE_NAME=${APM_SERVICE_NAME:-lumina-media}
      - APM_SERVICE_INSTANCE=${APM_SERVICE_INSTANCE:-lumina-media-instance-1}
      - APM_OAP_SERVER=${APM_OAP_SERVER:-http://skywalking-oap:12800}
      - APM_SAMPLE_RATE=${APM_SAMPLE_RATE:-1.0}
      - ALERT_EMAIL_ENABLED=${ALERT_EMAIL_ENABLED:-false}
      - ALERT_EMAIL_SMTP_HOST=${ALERT_EMAIL_SMTP_HOST:-smtp.example.com}
      - ALERT_EMAIL_SMTP_PORT=${ALERT_EMAIL_SMTP_PORT:-587}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-alerts@lumina-media.com}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-devops@example.com}
      - CHOKIDAR_USEPOLLING=true  # 强制 NestJS 底层监听器使用轮询
      - WATCHPACK_POLLING=true    # 确保 Webpack/TS 编译器捕获变更
      - CHOKIDAR_INTERVAL=100       # 轮询间隔（毫秒）
      - LOG_DIR=/app/logs           # 结构化日志目录
    ports:
      - "3003:3003"
    command: nodemon
    depends_on:
      db-lumina:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - .:/app                # 映射整个根目录
      - /app/node_modules     # 匿名卷，防止容器内依赖不被本地覆盖
      - ./logs:/app/logs      # 日志目录，供Filebeat收集
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lumina-media-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumina-media-qdrant
    restart: always
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # 不设置API_KEY环境变量，让Qdrant使用默认无认证模式
    networks:
      - lumina-media-network

  redis:
    image: redis:7-alpine
    container_name: lumina-media-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-lumina_redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumina-media-network

  dashboard:
    image: node:20-alpine
    container_name: lumina-media-dashboard
    restart: always
    ports:
      - "5174:5174"
    depends_on:
      - app
    volumes:
      - ./dashboard-web:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
      - CI=true
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --port 5174 --host 0.0.0.0"
    networks:
      - lumina-media-network

  skywalking-oap:
    image: apache/skywalking-oap-server:9.4.0
    container_name: lumina-media-skywalking-oap
    restart: always
    ports:
      - "11800:11800"  # gRPC端口
      - "12800:12800"  # HTTP端口
    environment:
      SW_STORAGE: mysql
      SW_JDBC_URL: jdbc:mysql://db-lumina:3306/skywalking?useSSL=false
      SW_DATA_SOURCE_USER: lumina_user
      SW_DATA_SOURCE_PASSWORD: lumina_password
      SW_ENABLE_MYSQL_DRIVER: "true"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      db-lumina:
        condition: service_healthy
    networks:
      - lumina-media-network

  skywalking-ui:
    image: apache/skywalking-ui:9.4.0
    container_name: lumina-media-skywalking-ui
    restart: always
    ports:
      - "8080:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      SW_UI_DEFAULT_INDEX: "service"
    depends_on:
      - skywalking-oap
    networks:
      - lumina-media-network

