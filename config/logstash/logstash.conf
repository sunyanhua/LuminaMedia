input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 解析JSON日志
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      target => "log"
    }

    # 添加时间戳字段
    date {
      match => [ "[log][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }

    # 添加服务名称
    mutate {
      add_field => {
        "[service][name]" => "lumina-media"
        "[service][environment]" => "%{[log][environment]}"
      }
      copy => {
        "[log][service]" => "[service][module]"
        "[log][module]" => "[service][submodule]"
      }
    }

    # 重命名字段以便更好地映射到Elasticsearch
    mutate {
      rename => {
        "[log][level]" => "[log][level]"
        "[log][action]" => "[log][action]"
        "[log][userId]" => "[user][id]"
        "[log][tenantId]" => "[tenant][id]"
        "[log][duration]" => "[log][duration_ms]"
        "[log][status]" => "[log][status]"
        "[log][errorCode]" => "[error][code]"
        "[log][errorMessage]" => "[error][message]"
        "[log][requestId]" => "[http][request_id]"
      }
    }

    # 删除原始消息字段，减少存储空间
    mutate {
      remove_field => ["message"]
    }
  } else {
    # 非JSON日志处理
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}" }
    }

    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    mutate {
      add_field => {
        "[service][name]" => "lumina-media"
      }
    }
  }

  # 添加地理IP信息（如果有）
  if [clientip] {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "lumina-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
  }

  # 调试输出（仅在开发环境启用）
  if [environment] == "development" {
    stdout {
      codec => rubydebug
    }
  }
}